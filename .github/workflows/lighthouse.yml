name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit production URLs
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://klushulpgids.nl/
            https://klushulpgids.nl/loodgieters
            https://klushulpgids.nl/loodgieters/amsterdam
            https://klushulpgids.nl/blog
            https://klushulpgids.nl/over-ons
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
